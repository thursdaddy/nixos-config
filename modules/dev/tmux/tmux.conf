# --- Tokyo Dark Palette ---
# Note: Using @variables so they don't conflict with shell env
BG_DARK="#1f2335"
BG="#24283b"
BG_HIGHLIGHT="#292e42"
TERMINAL_BLACK="#414868"
FG="#c0caf5"
FG_DARK="#a9b1d6"
FG_GUTTER="#3b4261"
DARK3="#545c7e"
COMMENT="#565f89"
DARK5="#737aa2"
BLUE0="#3d59a1"
BLUE="#7aa2f7"
CYAN="#7dcfff"
BLUE1="#2ac3de"
BLUE2="#0db9d7"
BLUE5="#89ddff"
BLUE6="#b4f9f8"
BLUE7="#394b70"
MAGENTA="#bb9af7"
MAGENTA2="#ff007c"
PURPLE="#9d7cd8"
ORANGE="#ff9e64"
YELLOW="#e0af68"
GREEN="#9ece6a"
GREEN1="#73daca"
GREEN2="#41a6b5"
TEAL="#1abc9c"
RED="#f7768e"

# --- General Settings ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 20000
set -s escape-time 0
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g status-interval 5
set -g status-justify left

# --- Prefix & Keybinds ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits & Kills
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# Navigation
bind -r C-a last-window
bind -r C-] next-window
bind -r [ select-pane -t :.-
bind -r ] select-pane -t :.+
bind -r Tab switch-client -l
bind -r o previous-window
bind -r p next-window

# Management
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"
bind C-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- UI & Theming ---
set -g pane-border-style fg='#6272a4'
set -g message-style bg="$BG_HIGHLIGHT",fg="$ORANGE"
set -g status-style bg='#44475a',fg='#bd93f9'
set -g mode-style "fg=$FG_DARK,bg=$TERMINAL_BLACK"

# Custom Window Formats
set -g window-status-current-format "#[fg=$MAGENTA]      #I#[fg=$BLUE1] ❘#[fg=$GREEN]#W#[fg=$BLUE1]★  "
set -g window-status-format "#[fg=$FG_DARK]      #I ❘#W  "

# Status Bar Left/Right
set -g status-left-length 100
set -g status-left "#[fg=$BG]#[bg=$BLUE5]#{?client_prefix,#[bg=$GREEN],}  "
set -ga status-left "#[fg=$FG]#[bg=$BG_DARK]  #S  "

set -g status-right-length 500
set -g status-right "#[fg=$BLUE5]#(hostname -s) #[fg=$BG]#[bg=$BLUE5]   #(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'no-git') "
set -ga status-right " #[bg=$BG_DARK]#[fg=$MAGENTA] %a #[bg=$BG_DARK]#[fg=$FG_DARK] %b %d #[fg=$TEAL] #[fg=$GREEN]%l:%M:%S "

# Riced session picker
bind-key Space choose-window -w -O name -F '#{?pane_format,#[fg=colour209]#{pane_current_command} #[fg=colour209]#{pane_title},#{?window_format,#[fg=colour209]#{window_name}#{window_flags}#{?#{==:#{window_panes},1}, #{?#{!=:#{window_name},#{pane_current_command}},#[fg=colour112]#{pane_current_command} ,}#[fg=colour39]#{pane_title},},#[fg=colour112]#{?session_grouped, (group #{session_group}: #{session_group_list}),}#{?session_attached,(attached),#[fg=colour9](unattached)}}}'

# --- Plugin Injections ---
# These @placeholder@ values are replaced by Nix
run-shell "@fzf@/share/tmux-plugins/tmux-fzf/main.tmux"
run-shell "@yank@/share/tmux-plugins/yank/yank.tmux"
