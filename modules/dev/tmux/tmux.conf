# --- Gruvbox Dark Palette ---
# Note: Using @variables so they don't conflict with shell env
BG_DARK="#1d2021"
BG="#282828"
BG_HIGHLIGHT="#3c3836"
TERMINAL_BLACK="#504945"
FG="#ebdbb2"
FG_DARK="#d5c4a1"
FG_GUTTER="#665c54"
DARK3="#bdae93"
COMMENT="#928374"
DARK5="#a89984"
BLUE0="#458588"
BLUE="#83a598"
CYAN="#8ec07c"
BLUE1="#83a598"
BLUE2="#458588"
BLUE5="#83a598"
BLUE6="#8ec07c"
BLUE7="#458588"
MAGENTA="#d3869b"
MAGENTA2="#b16286"
PURPLE="#d3869b"
ORANGE="#fe8019"
YELLOW="#fabd2f"
GREEN="#b8bb26"
GREEN1="#b8bb26"
GREEN2="#98971a"
TEAL="#8ec07c"
RED="#fb4934"

# --- General Settings ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 20000
set -s escape-time 0
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g status-interval 1
set -g status-justify left
set -g focus-events on
set-hook -g pane-focus-in "set-option -p @pane_finished 0"

# --- Prefix & Keybinds ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits & Kills
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# Navigation
bind -r C-a last-window
bind -r C-] next-window
bind -r [ select-pane -t :.-
bind -r ] select-pane -t :.+
# bind -r Tab switch-client -l
bind -r Tab if-shell -F "#{client_last_session}" "switch-client -l" "choose-window -w -O name -F '#{?pane_format,#[fg=#fe8019]#{pane_current_command} #[fg=#fe8019]#{pane_title},#{?window_format,#[fg=#fe8019]#{window_name}#{window_flags}#{?#{==:#{window_panes},1}, #{?#{!=:#{window_name},#{pane_current_command}},#[fg=#b8bb26]#{pane_current_command} ,}#[fg=#83a598]#{pane_title},},#[fg=#b8bb26]#{?session_grouped, (group #{session_group}: #{session_group_list}),}#{?session_attached,(attached),#[fg=#fb4934](unattached)}}}' "
bind -r o previous-window
bind -r p next-window
bind-key C-f display-popup -E -w 65% -h 65% -d "#{pane_current_path}" "fish -c tmuxs"

# Management
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# --- UI & Theming ---
set -g pane-border-style "fg=$FG_GUTTER"
set -g pane-active-border-style "fg=$BLUE1"
set -g message-style bg="$BG_HIGHLIGHT",fg="$ORANGE"
set -g status-style "bg=default,fg=$FG"
set -g mode-style "fg=$FG_DARK,bg=$TERMINAL_BLACK"
set -g popup-border-style "fg=$BLUE"
set -g popup-border-lines "rounded"
setw -g monitor-bell on
setw -g window-status-bell-style default

# Custom Window Formats
set -g window-status-current-format "#[fg=$MAGENTA]  #I#[fg=$BLUE1] ❘#[fg=$GREEN]#W#[fg=$BLUE1]★ "
set -g window-status-format "#[fg=$FG_DARK]  #I ❘#{?@pane_finished,#[fg=$RED],#{?window_bell_flag,#[fg=$RED],#[fg=$FG_DARK]}}#W#{?#{window_last_flag},#[fg=$BLUE2]-,} "

# Status Bar Left/Right
set -g status-left-length 100
set -g status-left " #[fg=$BLUE5]#{?client_prefix,#[fg=$GREEN],}    #[fg=$ORANGE,bold]#S #[fg=$YELLOW] ❘"

set -g status-right-length 700
set -g status-right "#(gitmux #{pane_current_path})  "
set -ga status-right "#[fg=$PURPLE]%a #[fg=$FG_DARK] #[fg=$PURPLE]%b %d "
set -ga status-right "#[fg=$YELLOW]%l:%M:%S "
set -ga status-right "#[fg=$ORANGE,bold]#(hostname -s) "

# Riced session picker
# Riced session picker (FZF flat window jumper)
bind-key Space display-popup -E -w 65% -h 65% -d "#{pane_current_path}" "fish -c 'tmuxs --windows'"

# --- Plugin Injections ---
# These @placeholder@ values are replaced by Nix
run-shell "@fzf@/share/tmux-plugins/tmux-fzf/main.tmux"
run-shell "@yank@/share/tmux-plugins/yank/yank.tmux"

# Automatically kill mopidy and rmpc when the music session is closed
set-hook -g session-closed 'if -F "#{==:#{hook_session_name},thurs}" "run-shell \"killall -9 mopidy rmpc || true\""'
