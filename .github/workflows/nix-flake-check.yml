name: Flake ❄️ Checker ✅

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:

jobs:
  nix-build:
    name: Check Flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
